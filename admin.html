<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - PC HAVEN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .admin-header {
      background: white;
      border-radius: 15px;
      padding: 20px 30px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .admin-nav {
      display: flex;
      gap: 10px;
    }
    
    .admin-nav-btn {
      padding: 10px 20px;
      border: none;
      background: #f8f9fa;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .admin-nav-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .admin-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 15px;
      padding: 25px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 2.5rem;
      font-weight: bold;
      margin: 10px 0;
    }
    
    .order-item {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
    }
    
    .status-badge {
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    
    .status-processing {
      background: #fff3cd;
      color: #856404;
    }
    
    .status-delivered {
      background: #d4edda;
      color: #155724;
    }
    
    .status-cancelled {
      background: #f8d7da;
      color: #721c24;
    }
    
    .product-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .product-form .full-width {
      grid-column: 1 / -1;
    }
    
    .product-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .product-table th,
    .product-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .product-table th {
      background: #f8f9fa;
      font-weight: 600;
    }
    
    .btn-action {
      padding: 5px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 5px;
      transition: all 0.3s;
    }
    
    .btn-edit {
      background: #ffc107;
      color: white;
    }
    
    .btn-delete {
      background: #dc3545;
      color: white;
    }
    
    .btn-deliver {
      background: #28a745;
      color: white;
    }
    
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- Header -->
    <div class="admin-header">
      <div>
        <h2><i class="bi bi-shield-lock"></i> Admin Dashboard</h2>
        <p class="mb-0 text-muted">PC HAVEN Management System</p>
      </div>
      <div>
        <span id="adminUsername" class="me-3"></span>
        <button class="btn btn-danger" onclick="adminLogout()">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>

    <!-- Navigation -->
    <div class="admin-card">
      <div class="admin-nav">
        <button class="admin-nav-btn active" onclick="showSection('dashboard')">
          <i class="bi bi-speedometer2"></i> Dashboard
        </button>
        <button class="admin-nav-btn" onclick="showSection('orders')">
          <i class="bi bi-cart-check"></i> Orders
        </button>
        <button class="admin-nav-btn" onclick="showSection('products')">
          <i class="bi bi-box-seam"></i> Products
        </button>
        <button class="admin-nav-btn" onclick="showSection('customers')">
          <i class="bi bi-people"></i> Customers
        </button>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="admin-section">
      <div class="row">
        <div class="col-md-3">
          <div class="stat-card">
            <i class="bi bi-cart-check" style="font-size: 2rem;"></i>
            <div class="stat-value" id="totalOrders">0</div>
            <div>Total Orders</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <i class="bi bi-currency-dollar" style="font-size: 2rem;"></i>
            <div class="stat-value" id="totalRevenue">₱0</div>
            <div>Total Revenue</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <i class="bi bi-clock-history" style="font-size: 2rem;"></i>
            <div class="stat-value" id="pendingOrders">0</div>
            <div>Pending Orders</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <i class="bi bi-box-seam" style="font-size: 2rem;"></i>
            <div class="stat-value" id="totalProducts">0</div>
            <div>Total Products</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Orders Section -->
    <div id="ordersSection" class="admin-section hidden">
      <div class="admin-card">
        <h4><i class="bi bi-cart-check"></i> All Orders</h4>
        <div id="ordersList"></div>
      </div>
    </div>

    <!-- Products Section -->
    <div id="productsSection" class="admin-section hidden">
      <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4><i class="bi bi-box-seam"></i> Product Management</h4>
          <button class="btn btn-primary" onclick="showAddProductForm()">
            <i class="bi bi-plus-circle"></i> Add Product
          </button>
        </div>
        
        <!-- Add/Edit Product Form -->
        <div id="productFormContainer" class="hidden mb-4">
          <h5 id="formTitle">Add New Product</h5>
          <form id="productForm" class="product-form">
            <input type="hidden" id="productId">
            <div>
              <label>Product ID</label>
              <input type="text" class="form-control" id="productIdInput" required>
            </div>
            <div>
              <label>Category</label>
              <select class="form-control" id="productCategory" required>
                <option value="cat-cpu">Processors</option>
                <option value="cat-gpu">Graphics Cards</option>
                <option value="cat-ram">Memory (RAM)</option>
                <option value="cat-mobo">Motherboards</option>
                <option value="cat-storage">Storage</option>
                <option value="cat-psu">Power Supply</option>
                <option value="cat-case">Cases</option>
                <option value="cat-cooler">Cooling</option>
              </select>
            </div>
            <div class="full-width">
              <label>Product Name</label>
              <input type="text" class="form-control" id="productName" required>
            </div>
            <div class="full-width">
              <label>Specifications</label>
              <textarea class="form-control" id="productSpec" rows="2"></textarea>
            </div>
            <div>
              <label>Price (₱)</label>
              <input type="number" class="form-control" id="productPrice" step="0.01" required>
            </div>
            <div>
              <label>Stock</label>
              <input type="number" class="form-control" id="productStock" required>
            </div>
            <div>
              <label>Label</label>
              <input type="text" class="form-control" id="productLabel" placeholder="e.g., Hot, New, Sale">
            </div>
            <div>
              <label>Emoji</label>
              <input type="text" class="form-control" id="productEmoji" placeholder="e.g., 🔥">
            </div>
            <div class="full-width">
              <label>Image URL</label>
              <input type="text" class="form-control" id="productImage">
            </div>
            <div class="full-width">
              <button type="submit" class="btn btn-success me-2">
                <i class="bi bi-check-circle"></i> Save Product
              </button>
              <button type="button" class="btn btn-secondary" onclick="hideProductForm()">
                Cancel
              </button>
            </div>
          </form>
        </div>

        <!-- Products Table -->
        <div id="productsTable"></div>
      </div>
    </div>

    <!-- Customers Section -->
    <div id="customersSection" class="admin-section hidden">
      <div class="admin-card">
        <h4><i class="bi bi-people"></i> Registered Customers</h4>
        <div id="customersList"></div>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
