<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — PC HAVEN</title>
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><style>text{font-family:Arial,sans-serif;font-weight:800;}</style></defs><rect width='100' height='100' fill='%23ff6b1a'/><text x='50' y='35' font-size='22' fill='white' text-anchor='middle'>PC</text><text x='50' y='70' font-size='16' fill='white' text-anchor='middle'>HAVEN</text></svg>" />
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  
  <style>
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 100px 20px 40px;
    }
    
    /* Custom Modal Styles */
    .custom-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      animation: fadeIn 0.2s ease;
    }
    
    .custom-modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .custom-modal-header {
      padding: 20px 25px;
      border-bottom: 1px solid var(--border);
    }
    
    .custom-modal-header h3 {
      margin: 0;
      font-family: var(--font-display);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.3rem;
    }
    
    .custom-modal-body {
      padding: 25px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .custom-modal-footer {
      padding: 20px 25px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    
    .btn-modal-cancel,
    .btn-modal-confirm {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      font-weight: 600;
      font-family: var(--font-display);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-modal-cancel {
      background: var(--bg-muted);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    
    .btn-modal-cancel:hover {
      background: var(--bg-surface);
    }
    
    .btn-modal-confirm {
      background: var(--accent);
      color: white;
    }
    
    .btn-modal-confirm:hover {
      background: var(--accent-hover);
    }
    
    .btn-modal-confirm.btn-danger {
      background: #dc3545;
    }
    
    .btn-modal-confirm.btn-danger:hover {
      background: #c82333;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* ============================================================
       MOBILE RESPONSIVE STYLES
    ============================================================ */
    
    /* Mobile: Small devices (phones, less than 768px) */
    @media (max-width: 767px) {
      .admin-container {
        padding: 80px 10px 20px;
      }
      
      .admin-header {
        padding: 15px;
        margin-bottom: 15px;
        flex-direction: column;
        align-items: flex-start !important;
      }
      
      .admin-header > div:last-child {
        width: 100%;
        justify-content: space-between;
        margin-top: 15px;
      }
      
      .admin-header h2 {
        font-size: 1.3rem;
        width: 100%;
      }
      
      .admin-nav {
        width: 100%;
        flex-direction: column;
        gap: 8px;
      }
      
      .admin-nav-btn {
        width: 100%;
        justify-content: center;
        padding: 12px 15px;
        font-size: 0.9rem;
      }
      
      .admin-card {
        padding: 15px;
        margin-bottom: 15px;
      }
      
      .admin-card h4 {
        font-size: 1.1rem;
      }
      
      /* Stats Grid */
      .stats-grid {
        grid-template-columns: 1fr !important;
        gap: 10px !important;
      }
      
      .stat-card {
        padding: 15px !important;
      }
      
      .stat-card h3 {
        font-size: 1.5rem !important;
      }
      
      /* Orders */
      .order-item {
        padding: 15px !important;
        margin-bottom: 12px !important;
      }
      
      .order-item h6 {
        font-size: 0.95rem;
      }
      
      .order-item .status-badge {
        font-size: 0.7rem;
        padding: 3px 8px;
      }
      
      .order-item ul {
        font-size: 0.85rem;
        padding-left: 20px;
      }
      
      .btn-action {
        padding: 8px 12px !important;
        font-size: 0.8rem !important;
        width: 100%;
        margin-bottom: 8px;
      }
      
      /* Products Table */
      .product-table {
        font-size: 0.8rem;
      }
      
      .product-table th,
      .product-table td {
        padding: 8px 5px !important;
      }
      
      .product-table img {
        width: 40px !important;
        height: 40px !important;
      }
      
      /* Hide some columns on mobile */
      .product-table th:nth-child(3),
      .product-table td:nth-child(3),
      .product-table th:nth-child(4),
      .product-table td:nth-child(4) {
        display: none;
      }
      
      /* Component Requests */
      .request-card {
        padding: 12px !important;
        margin-bottom: 12px !important;
      }
      
      .request-card h6 {
        font-size: 0.95rem;
      }
      
      .request-card .badge {
        font-size: 0.7rem;
      }
      
      .request-card p {
        font-size: 0.85rem;
      }
      
      .request-card .btn {
        padding: 6px 10px;
        font-size: 0.75rem;
        margin-bottom: 6px;
      }
      
      /* Custom Modal Mobile */
      .custom-modal {
        width: 95%;
        max-height: 85vh;
      }
      
      .custom-modal-header {
        padding: 15px;
      }
      
      .custom-modal-header h3 {
        font-size: 1.1rem;
      }
      
      .custom-modal-body {
        padding: 15px;
      }
      
      .custom-modal-footer {
        padding: 15px;
        flex-direction: column;
      }
      
      .btn-modal-cancel,
      .btn-modal-confirm {
        width: 100%;
        justify-content: center;
        padding: 12px;
      }
      
      /* Form Controls */
      .form-control,
      .form-select {
        font-size: 0.9rem;
      }
      
      /* Delivery Address Display */
      .order-item > div[style*="border-left"] {
        padding: 10px !important;
        font-size: 0.85rem;
      }
    }
    
    /* Tablet: Medium devices (tablets, 768px to 991px) */
    @media (min-width: 768px) and (max-width: 991px) {
      .admin-container {
        padding: 90px 15px 30px;
      }
      
      .admin-header {
        padding: 20px;
      }
      
      .admin-nav {
        gap: 8px;
      }
      
      .admin-nav-btn {
        padding: 10px 15px;
        font-size: 0.9rem;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      
      .product-table {
        font-size: 0.85rem;
      }
      
      .product-table th,
      .product-table td {
        padding: 10px 8px !important;
      }
    }
    
    /* Landscape Mobile */
    @media (max-width: 767px) and (orientation: landscape) {
      .admin-container {
        padding: 70px 10px 20px;
      }
      
      .admin-header {
        padding: 12px;
      }
      
      .admin-header h2 {
        font-size: 1.2rem;
      }
      
      .admin-nav-btn {
        padding: 10px 12px;
        font-size: 0.85rem;
      }
    }
    
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 100px 20px 40px;
    }
    
    .admin-header {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 25px 30px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    .admin-header h2 {
      font-family: var(--font-display);
      color: var(--text-primary);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .admin-header h2 i {
      color: var(--accent);
    }
    
    .admin-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .admin-nav-btn {
      padding: 10px 20px;
      border: 1px solid var(--border);
      background: var(--bg-muted);
      border-radius: var(--radius-btn);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-display);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .admin-nav-btn:hover {
      background: var(--bg-surface);
      color: var(--text-primary);
      border-color: var(--accent);
    }
    
    .admin-nav-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .admin-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 25px;
      margin-bottom: 20px;
    }
    
    .admin-card h4 {
      font-family: var(--font-display);
      color: var(--text-primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* Order Items - Fix Text Visibility */
    .order-item {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 20px;
      margin-bottom: 15px;
    }
    
    .order-item h6 {
      color: var(--text-primary) !important;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .order-item p {
      color: var(--text-primary) !important;
      margin-bottom: 5px;
    }
    
    .order-item .text-muted {
      color: var(--text-secondary) !important;
      opacity: 0.9;
    }
    
    /* Make all muted text more visible */
    .text-muted,
    p.text-muted,
    small.text-muted {
      color: var(--text-secondary) !important;
      opacity: 0.85 !important;
    }
    
    /* Ensure secondary text is visible */
    .text-secondary {
      color: var(--text-secondary) !important;
      opacity: 0.9 !important;
    }
    
    .order-item strong {
      color: var(--text-primary) !important;
    }
    
    .order-item ul {
      color: var(--text-primary) !important;
    }
    
    .order-item ul li {
      color: var(--text-primary) !important;
      margin-bottom: 5px;
    }
    
    /* Delivery Address Section */
    .order-item > div[style*="border-left"] {
      background: var(--bg-muted) !important;
      color: var(--text-primary) !important;
    }
    
    .order-item > div[style*="border-left"] p {
      color: var(--text-primary) !important;
    }
    
    .order-item > div[style*="border-left"] strong {
      color: var(--text-primary) !important;
    }
    
    /* Status Badges */
    .status-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-block;
    }
    
    .status-processing {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
      border: 1px solid #ffc107;
    }
    
    .status-delivered {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
      border: 1px solid #28a745;
    }
    
    .status-cancelled {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
      border: 1px solid #dc3545;
    }
    
    /* Action Buttons */
    .btn-action {
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 8px;
      margin-top: 8px;
    }
    
    .btn-deliver {
      background: #28a745;
      color: white;
    }
    
    .btn-deliver:hover {
      background: #218838;
    }
    
    .btn-delete {
      background: #dc3545;
      color: white;
    }
    
    .btn-delete:hover {
      background: #c82333;
    }
    
    /* Theme Toggle Button */
    .theme-toggle {
      background: var(--bg-muted);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 1.1rem;
    }
    
    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }
    
    .theme-toggle:active {
      transform: scale(0.95);
    }
    
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: white;
      border-radius: var(--radius-card);
      padding: 25px;
      text-align: center;
    }
    
    .stat-card i {
      font-size: 2.5rem;
      opacity: 0.9;
      margin-bottom: 10px;
    }
    
    .stat-value {
      font-size: 2.5rem;
      font-weight: bold;
      font-family: var(--font-display);
      margin: 10px 0;
    }
    
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.9;
    }
    
    .order-item, .product-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 20px;
      margin-bottom: 15px;
      background: var(--bg-surface);
    }
    
    .status-badge {
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-block;
    }
    
    .status-processing {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
      border: 1px solid rgba(255, 193, 7, 0.3);
    }
    
    .status-delivered {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
      border: 1px solid rgba(40, 167, 69, 0.3);
    }
    
    .status-cancelled {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
      border: 1px solid rgba(220, 53, 69, 0.3);
    }
    
    .product-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .product-form .full-width {
      grid-column: 1 / -1;
    }
    
    .product-form label {
      display: block;
      margin-bottom: 5px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 600;
    }
    
    .product-form input,
    .product-form select,
    .product-form textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      background: var(--bg-muted);
      color: var(--text-primary);
      font-family: var(--font-body);
    }
    
    .product-form input:focus,
    .product-form select:focus,
    .product-form textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-surface);
    }
    
    .product-table {
      width: 100%;
      border-collapse: collapse;
      overflow-x: auto;
      display: block;
    }
    
    .product-table thead,
    .product-table tbody,
    .product-table tr {
      display: table;
      width: 100%;
      table-layout: fixed;
    }
    
    .product-table th,
    .product-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    .product-table th {
      background: var(--bg-muted);
      font-weight: 600;
      color: var(--text-secondary);
      font-family: var(--font-display);
    }
    
    .product-table td {
      color: var(--text-primary);
    }
    
    /* Ensure all table text is visible in both themes */
    .product-table td,
    .product-table th {
      color: var(--text-primary) !important;
    }
    
    .product-table tbody tr {
      background: var(--bg-surface);
    }
    
    .product-table tbody tr:hover {
      background: var(--bg-muted);
    }
    
    /* Fix Bootstrap table overrides */
    .table-responsive .product-table {
      background: transparent !important;
    }
    
    .table-responsive .product-table td,
    .table-responsive .product-table th {
      background: transparent !important;
    }
    
    .btn-action {
      padding: 6px 15px;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      margin-right: 5px;
      transition: all var(--transition);
      font-size: 0.85rem;
      font-weight: 600;
    }
    
    .btn-edit {
      background: #ffc107;
      color: #000;
    }
    
    .btn-edit:hover {
      background: #ffca2c;
    }
    
    .btn-delete {
      background: #dc3545;
      color: white;
    }
    
    .btn-delete:hover {
      background: #c82333;
    }
    
    .btn-deliver {
      background: #28a745;
      color: white;
    }
    
    .btn-deliver:hover {
      background: #218838;
    }
    
    .hidden {
      display: none !important;
    }
    
    @media (max-width: 768px) {
      .admin-container {
        padding: 80px 15px 20px;
      }
      
      .product-form {
        grid-template-columns: 1fr;
      }
      
      .stat-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation (same as user page) -->
  <nav id="mainNav">
    <div class="container d-flex align-items-center justify-content-between py-2">
      <a class="navbar-brand" href="home.html">PC <span>HAVEN</span></a>

      <div class="d-none d-lg-flex align-items-center gap-2">
        <span class="nav-link" style="color: var(--accent); font-weight: 600;">
          <i class="bi bi-shield-lock"></i> Admin Dashboard
        </span>
      </div>

      <div class="d-flex align-items-center gap-3">
        <button class="theme-toggle d-none d-lg-flex" id="themeToggle" title="Toggle Light/Dark Mode">
          <i class="bi bi-moon-stars-fill"></i>
        </button>

        <div style="display: flex; align-items: center; gap: 10px;">
          <span id="adminUsername" style="color: var(--text-secondary); font-size: 0.9rem;"></span>
          <button class="btn btn-sm" style="background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: var(--radius-btn);" onclick="adminLogout()">
            <i class="bi bi-box-arrow-right"></i> Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="admin-container">
    <!-- Header -->
    <div class="admin-header">
      <div>
        <h2><i class="bi bi-shield-lock"></i> Admin Dashboard</h2>
        <p style="color: var(--text-secondary); margin: 5px 0 0 0; font-size: 0.9rem;">PC HAVEN Management System</p>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="theme-toggle" id="themeToggle" title="Toggle Light/Dark Mode">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
        <button class="btn btn-danger" onclick="adminLogout()" style="padding: 8px 16px; font-size: 0.9rem;">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>

    <!-- Navigation -->
    <div class="admin-card">
      <div class="admin-nav">
        <button class="admin-nav-btn active" onclick="showSection('dashboard')">
          <i class="bi bi-speedometer2"></i> Dashboard
        </button>
        <button class="admin-nav-btn" onclick="showSection('orders')">
          <i class="bi bi-cart-check"></i> Orders
        </button>
        <button class="admin-nav-btn" onclick="showSection('products')">
          <i class="bi bi-box-seam"></i> Products
        </button>
        <button class="admin-nav-btn" onclick="showSection('customers')">
          <i class="bi bi-people"></i> Customers
        </button>
        <button class="admin-nav-btn" onclick="showSection('requests')">
          <i class="bi bi-chat-dots"></i> Component Requests
        </button>
        <button class="admin-nav-btn" onclick="showSection('services')">
          <i class="bi bi-tools"></i> Tech Services
        </button>
        <button class="admin-nav-btn" onclick="showSection('bookings')">
          <i class="bi bi-calendar-check"></i> Service Bookings
        </button>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="admin-section">
      <div class="stat-grid">
        <div class="stat-card">
          <i class="bi bi-cart-check"></i>
          <div class="stat-value" id="totalOrders">0</div>
          <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat-card">
          <i class="bi bi-currency-dollar"></i>
          <div class="stat-value" id="totalRevenue">₱0</div>
          <div class="stat-label">Total Revenue</div>
        </div>
        <div class="stat-card">
          <i class="bi bi-calendar-check"></i>
          <div class="stat-value" id="totalBookings">0</div>
          <div class="stat-label">Service Bookings</div>
        </div>
        <div class="stat-card">
          <i class="bi bi-clock-history"></i>
          <div class="stat-value" id="pendingOrders">0</div>
          <div class="stat-label">Pending Orders</div>
        </div>
        <div class="stat-card">
          <i class="bi bi-box-seam"></i>
          <div class="stat-value" id="totalProducts">0</div>
          <div class="stat-label">Total Products</div>
        </div>
      </div>
    </div>

    <!-- Orders Section -->
    <div id="ordersSection" class="admin-section hidden">
      <div class="admin-card">
        <h4><i class="bi bi-cart-check"></i> All Orders</h4>
        <div id="ordersList"></div>
      </div>
    </div>

    <!-- Products Section -->
    <div id="productsSection" class="admin-section hidden">
      <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h4 style="margin: 0;"><i class="bi bi-box-seam"></i> Product Management</h4>
          <button class="btn" style="background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: var(--radius-btn);" onclick="showAddProductForm()">

        <!-- Add/Edit Product Form -->
        <div id="productFormContainer" class="hidden mb-4">
          <h5 id="formTitle" style="color: var(--text-primary); margin-bottom: 15px;">Add New Product</h5>
          <form id="productForm" class="product-form">
            <input type="hidden" id="productId">
            <div>
              <label>Product ID</label>
              <input type="text" id="productIdInput" required>
            </div>
            <div>
              <label>Category</label>
              <select id="productCategory" required>
                <option value="cat-cpu">Processors</option>
                <option value="cat-gpu">Graphics Cards</option>
                <option value="cat-ram">Memory (RAM)</option>
                <option value="cat-mobo">Motherboards</option>
                <option value="cat-storage">Storage</option>
                <option value="cat-psu">Power Supply</option>
                <option value="cat-case">Cases</option>
                <option value="cat-cooler">Cooling</option>
              </select>
            </div>
            <div class="full-width">
              <label>Product Name</label>
              <input type="text" id="productName" required>
            </div>
            <div class="full-width">
              <label>Specifications</label>
              <textarea id="productSpec" rows="2"></textarea>
            </div>
            <div>
              <label>Price (₱)</label>
              <input type="number" id="productPrice" step="0.01" required>
            </div>
            <div>
              <label>Stock</label>
              <input type="number" id="productStock" required>
            </div>
            <div>
              <label>Label</label>
              <input type="text" id="productLabel" placeholder="e.g., Hot, New, Sale">
            </div>
            <div>
              <label>Emoji</label>
              <input type="text" id="productEmoji" placeholder="e.g., 🔥">
            </div>
            <div class="full-width">
              <label>Image URL</label>
              <input type="text" id="productImage">
            </div>
            <div class="full-width">
              <button type="submit" class="btn" style="background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: var(--radius-btn); margin-right: 10px;">
                <i class="bi bi-check-circle"></i> Save Product
              </button>
              <button type="button" class="btn" style="background: var(--bg-muted); color: var(--text-primary); border: 1px solid var(--border); padding: 10px 20px; border-radius: var(--radius-btn);" onclick="hideProductForm()">
                Cancel
              </button>
            </div>
          </form>
        </div>

        <!-- Products Table -->
        <div id="productsTable" style="overflow-x: auto;"></div>
      </div>
    </div>

    <!-- Customers Section -->
    <div id="customersSection" class="admin-section hidden">
      <div class="admin-card">
        <h4><i class="bi bi-people"></i> Registered Customers</h4>
        <div id="customersList"></div>
      </div>
    </div>

    <!-- Component Requests Section -->
    <div id="requestsSection" class="admin-section hidden">
      <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4><i class="bi bi-chat-dots"></i> Component Requests</h4>
          <button class="btn btn-sm" onclick="loadComponentRequests()" style="background: var(--bg-muted); color: var(--text-secondary); border: 1px solid var(--border);">
            <i class="bi bi-arrow-clockwise"></i> Refresh
          </button>
        </div>
        <div id="requestsList"></div>
      </div>
    </div>

    <!-- Tech Services Section -->
    <div id="servicesSection" class="admin-section hidden">
      <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h4 style="margin: 0;"><i class="bi bi-tools"></i> Tech Services Management</h4>
          <button class="btn" style="background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: var(--radius-btn);" onclick="showAddServiceModal()">
            <i class="bi bi-plus-circle"></i> Add Service
          </button>
        </div>

        <!-- Services Table -->
        <div id="servicesTable" style="overflow-x: auto;"></div>
      </div>
    </div>

    <!-- Service Bookings Section -->
    <div id="bookingsSection" class="admin-section hidden">
      <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4><i class="bi bi-calendar-check"></i> Service Bookings</h4>
          <button class="btn btn-sm" onclick="loadServiceBookings()" style="background: var(--bg-muted); color: var(--text-secondary); border: 1px solid var(--border);">
            <i class="bi bi-arrow-clockwise"></i> Refresh
          </button>
        </div>
        <div id="bookingsList"></div>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Theme Toggle Script -->
  <script>
    // Get all theme toggle buttons
    const themeToggleButtons = document.querySelectorAll('[id="themeToggle"]');
    const currentTheme = localStorage.getItem('pchaven_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', currentTheme);
    
    // Update all theme icons
    function updateThemeIcon(theme) {
      themeToggleButtons.forEach(btn => {
        const icon = btn.querySelector('i');
        if (icon) {
          if (theme === 'light') {
            icon.className = 'bi bi-sun-fill';
          } else {
            icon.className = 'bi bi-moon-stars-fill';
          }
        }
      });
    }
    
    updateThemeIcon(currentTheme);

    // Add click event to all theme toggle buttons
    themeToggleButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const target = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', target);
        localStorage.setItem('pchaven_theme', target);
        updateThemeIcon(target);
      });
    });
  </script>
</body>
</html>
