<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — PC HAVEN</title>
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><style>text{font-family:Arial,sans-serif;font-weight:800;}</style></defs><rect width='100' height='100' fill='%23ff6b1a'/><text x='50' y='35' font-size='22' fill='white' text-anchor='middle'>PC</text><text x='50' y='70' font-size='16' fill='white' text-anchor='middle'>HAVEN</text></svg>" />
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <button class="theme-toggle-login" id="themeToggle" title="Toggle Light/Dark Mode">
    <i class="bi bi-moon-stars-fill"></i>
  </button>

  <div class="login-container">
    <div class="auth-card">
      <div class="auth-sidebar">
        <div class="auth-sidebar-content">
          <h2>Welcome to PC HAVEN</h2>
          <p>Your ultimate destination for premium PC components and custom builds.</p>
          <ul class="auth-features">
            <li><i class="bi bi-check-circle-fill"></i> Access exclusive deals</li>
            <li><i class="bi bi-check-circle-fill"></i> Save custom PC builds</li>
            <li><i class="bi bi-check-circle-fill"></i> Track order history</li>
            <li><i class="bi bi-check-circle-fill"></i> Priority customer support</li>
          </ul>
        </div>
      </div>

      <div class="auth-main">
        <div class="auth-header">
          <div class="auth-logo">PC <span>HAVEN</span></div>
          <p class="auth-subtitle">Hardware Command Center</p>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Login</button>
          <button class="auth-tab" onclick="switchTab('register')">Register</button>
        </div>

        <div id="alertMessage" class="alert-message"></div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
          <div class="form-group">
            <label class="form-label">Email or Username</label>
            <input type="text" id="loginEmail" class="form-control-custom" placeholder="your.email@gmail.com or admin" required />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="loginPassword" class="form-control-custom" placeholder="Enter your password" required />
              <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                <i class="bi bi-eye" id="loginPassword-icon"></i>
              </button>
            </div>
          </div>

          <div class="remember-forgot">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="btn-auth">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="registerName" class="form-control-custom" placeholder="John Doe" required />
          </div>

          <div class="form-group">
            <label class="form-label">Email Address (Gmail only)</label>
            <input type="email" id="registerEmail" class="form-control-custom" placeholder="yourname@gmail.com" pattern=".*@gmail\.com$" title="Please use a Gmail address" required />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="registerPassword" class="form-control-custom" placeholder="Create a strong password" required />
              <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')">
                <i class="bi bi-eye" id="registerPassword-icon"></i>
              </button>
            </div>
            <div class="password-strength">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <span id="strengthText" class="text-muted">Password strength</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="registerConfirmPassword" class="form-control-custom" placeholder="Confirm your password" required />
              <button type="button" class="password-toggle" onclick="togglePassword('registerConfirmPassword')">
                <i class="bi bi-eye" id="registerConfirmPassword-icon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-auth">
            <i class="bi bi-person-plus-fill"></i> Create Account
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
